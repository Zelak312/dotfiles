name: Go Release Builder

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    name: Build Go
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: ['linux-amd64', 'linux-arm64']

    steps:
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.20.5  # use the Go version of your choice

    - name: Check out code into the Go module directory
      uses: actions/checkout@v3

    - name: Build
      run: |
        GOOS=${{ matrix.platform %%-* }}
        GOARCH=${{ matrix.platform ##*- }}
        go env
        go build -v -o dotfiles-${{ matrix.platform }} .
      shell: bash

    - name: Archive production artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dotfiles-${{ matrix.platform }}
        path: ./dotfiles-${{ matrix.platform }}

  upload:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: ['linux-amd64', 'linux-arm64']

    steps:
    - name: Download a build artifact
      uses: actions/download-artifact@v3
      with:
        name: dotfiles-${{ matrix.platform }}

    - name: Upload Release Asset
      if: github.event_name == 'release'  # Only run if this workflow was triggered by a release
      uses: softprops/action-gh-release@v1
      with:
        files: dotfiles-${{ matrix.platform }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
